databases:
  - name: msme_db
    databaseName: msme_db
    user: msme_user
    plan: free

services:
  - type: web
    name: msme-backend
    runtime: python
    buildCommand: "sh backend/build.sh"
    startCommand: "gunicorn core.wsgi:application --chdir backend"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: msme_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3" # or whatever they use
